# Plain static site — no build step. Netlify serves the repo root as-is.
# A non-empty no-op command is required to override the legacy Hugo build
# command still configured in the Netlify UI (an empty string does not).
[build]
  publish = "."
  command = "echo 'Static site — nothing to build.'"

# Sensible security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
